# =============================================================================
# Fleet inventory  --  the master list of every Linux server the agent knows.
#
# Paste your real servers below. Group them however makes sense (region, env,
# role). The collection playbook runs against [all], so every host listed under
# any group is picked up automatically.
#
# Format per line:
#   <name>            ansible_host=<ip>        [extra vars...]
#
# `ansible_host` is optional if <name> already resolves in DNS, but supplying
# the IP explicitly means the agent can always report an address.
# =============================================================================

[linux_servers]
# web01.ali.local     ansible_host=10.0.10.11
# web02.ali.local     ansible_host=10.0.10.12
# db01.ali.local      ansible_host=10.0.20.5

# ---- Example of grouping by region (mirrors your ad-domain-join layout) ----
# [region_us]
# app-us-01           ansible_host=10.1.0.10
#
# [region_eu]
# app-eu-01           ansible_host=10.2.0.10

[all:vars]
# SSH user the control node connects as. Use a read-capable service account.
ansible_user=svc_ansible

# Privilege escalation: package/service facts on some distros need root.
# Supply the become password via `--ask-become-pass` or (better) a vault file,
# never in plaintext here.
ansible_become=true
ansible_become_method=sudo

# Speeds up large fleets; safe for read-only fact collection.
ansible_ssh_pipelining=true
